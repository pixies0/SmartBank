<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>SmartBank</title>

    <!-- Bootstrap core CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />

    <!-- Custom styles for this template -->
    <link href="assets/css/styles.css" rel="stylesheet" />
    <link href="assets/css/conversor.css" rel="stylesheet" />
  </head>

  <body>
    <header>
      <!-- Fixed navbar -->
      <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
        <a class="navbar-brand" href="/index.html">SmartBank</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarCollapse"
          aria-controls="navbarCollapse"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item">
              <a class="nav-link" href="#">
                Conversão
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                Listar Saldo
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                Transferência
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">
                Login
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <!-- Begin page content -->
    <main role="main" class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
      <div class="card p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <form id="conversor-form">
          <div class="form-group">
            <label for="valor">Valor</label>
            <input
              type="number"
              class="form-control"
              id="valor"
              placeholder="Digite o valor"
              required
            />
          </div>
          <div class="form-group">
            <label for="moedaOrigem">Moeda de origem</label>
            <select class="form-control" id="moedaOrigem" required>
              <option value="">Selecione a moeda</option>
              <option value="USD">Dólar (USD)</option>
              <option value="EUR">Euro (EUR)</option>
              <option value="BRL">Real (BRL)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="moedaDestino">Moeda de destino</label>
            <select class="form-control" id="moedaDestino" required>
              <option value="">Selecione a moeda</option>
              <option value="USD">Dólar (USD)</option>
              <option value="EUR">Euro (EUR)</option>
              <option value="BRL">Real (BRL)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-dark btn-block">Converter</button>
        </form>
        <div id="resultado" class="mt-3 text-center">POR ENQUANTO NÃO TEM NADA</div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <span class="text-muted">Desenvolvido por pixies0 &copy; 2026</span>
      </div>
    </footer>

    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script
      src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
      integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
      integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
